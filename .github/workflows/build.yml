name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            ffmpeg_suffix: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            ffmpeg_suffix: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ffmpeg_suffix: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ffmpeg_suffix: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download FFmpeg binaries (macOS ARM)
        if: matrix.platform == 'macos-latest' && matrix.target == 'aarch64-apple-darwin'
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          mv ffmpeg src-tauri/ffmpeg-aarch64-apple-darwin
          mv ffprobe src-tauri/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/ffmpeg-* src-tauri/ffprobe-*

      - name: Download FFmpeg binaries (macOS Intel)
        if: matrix.platform == 'macos-latest' && matrix.target == 'x86_64-apple-darwin'
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          mv ffmpeg src-tauri/ffmpeg-x86_64-apple-darwin
          mv ffprobe src-tauri/ffprobe-x86_64-apple-darwin
          chmod +x src-tauri/ffmpeg-* src-tauri/ffprobe-*

      - name: Download FFmpeg binaries (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L -o ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar xf ffmpeg.tar.xz
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg  src-tauri/ffmpeg-x86_64-unknown-linux-gnu
          cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe src-tauri/ffprobe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/ffmpeg-* src-tauri/ffprobe-*

      - name: Download FFmpeg binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Copy-Item "ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe"  "src-tauri\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item "ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" "src-tauri\ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="Release ${GITHUB_REF_NAME}"

          # Ler assinaturas dos bundles atualizaveis
          MAC_AARCH64_SIG=""
          MAC_X64_SIG=""
          LINUX_SIG=""
          WINDOWS_SIG=""

          for f in artifacts/*aarch64-apple-darwin*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_AARCH64_SIG=$(cat "$f")
          done
          for f in artifacts/*x86_64-apple-darwin*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_X64_SIG=$(cat "$f")
          done
          for f in artifacts/*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
          done
          for f in artifacts/*.nsis.zip.sig; do
            [ -f "$f" ] && WINDOWS_SIG=$(cat "$f")
          done

          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          # Descobrir nomes dos arquivos atualizaveis
          MAC_AARCH64_FILE=""
          MAC_X64_FILE=""
          LINUX_FILE=""
          WINDOWS_FILE=""

          for f in artifacts/*aarch64-apple-darwin*.app.tar.gz; do
            [ -f "$f" ] && MAC_AARCH64_FILE=$(basename "$f")
          done
          for f in artifacts/*x86_64-apple-darwin*.app.tar.gz; do
            [ -f "$f" ] && MAC_X64_FILE=$(basename "$f")
          done
          for f in artifacts/*.AppImage.tar.gz; do
            [ -f "$f" ] && LINUX_FILE=$(basename "$f")
          done
          for f in artifacts/*.nsis.zip; do
            [ -f "$f" ] && WINDOWS_FILE=$(basename "$f")
          done

          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_AARCH64_SIG}",
                "url": "${BASE_URL}/${MAC_AARCH64_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${BASE_URL}/${MAC_X64_FILE}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILE}"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/${WINDOWS_FILE}"
              }
            }
          }
          ENDJSON

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.AppImage.tar.gz.sig
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip
            artifacts/**/*.nsis.zip.sig
            latest.json
